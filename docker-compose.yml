version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: cogniseek-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: cogniseek
      POSTGRES_PASSWORD: cogniseek123
      POSTGRES_DB: cogniseek

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: