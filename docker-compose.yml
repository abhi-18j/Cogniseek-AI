version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: omnis_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:15
    container_name: omnis_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omni_password}
      POSTGRES_DB: ${POSTGRES_DB:-omnis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni} -d ${POSTGRES_DB:-omnis}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
